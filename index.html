<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Higher Roads</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #111111;
      color: #f5f1e8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .hero {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      line-height: 1.1;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      max-width: 700px;
      margin: 0 auto 30px;
      color: #d7d2c8;
    }

    .reel-placeholder {
      margin-top: 40px;
      padding: 40px 20px;
      border: 1px solid rgba(245, 241, 232, 0.2);
      border-radius: 12px;
      color: #bdb7ac;
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1>Higher Roads is coming soon.</h1>
    <p>
      Strategy, product, brand, and execution for emerging wellness,
      alternative CPG, and modern consumer experiences.
    </p>

    <div class="reel-placeholder">
      Demo reel coming here
    </div>
  </main>
</body>
</html>
