.pass-label { font-family: 'Rajdhani', sans-serif; font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(232,120,42,0.4); margin-bottom: 14px; margin-top: 4px; padding-bottom: 8px; border-bottom: 1px solid rgba(232,120,42,0.08); }

<script>
const WORKER = 'https://higher-roads-claude.grey-4fe.workers.dev/';
const KEY_STORAGE = 'hr_claude_key';

const PERSONAS = [
  {
    id: "growth_marketer",
    name: "Growth-Stage Marketer",
    brief: "Marketing leader at a product brand that has identity, packaging, and channels — but needs to feel more premium and campaign-ready.",
    felt: "The product and brand deserve a stronger visual presence than current assets provide.",
    systemPrompt: `You are a marketing leader at a growth-stage product brand. The brand has identity, packaging, products, and channels. You are not shopping for a named production category. You feel the brand needs to level up visually — but you have not defined what that means in production terms yet.

Your felt problem: The product and brand deserve a stronger visual presence than current assets provide.

Your motivations: Make the launch feel bigger. Get more mileage from existing brand identity and packaging. Create visual consistency across channels. Avoid another disconnected content sprint. Bring a strong vendor recommendation to leadership.

Your internal risks: The investment is hard to explain internally. Work looks beautiful but does not fit launch needs. Vendor creates impressive one-off assets without helping channel rollout. Timeline or approval process gets messy.

What you notice: Strong taste. Relevant product work. Evidence of consistency across formats. Confidence that the studio understands brand systems. Enough process clarity to trust the handoff.

Do not behave like a procurement officer. Do not require package grids or deliverable counts. You are evaluating whether this page makes you want the upgrade and trust the studio enough to reach out.

Evaluate the page in three passes.

PASS 1 — NATIVE BUYER READ:
Read the page as a buyer encountering this site for the first time. Do not apply any vendor-specific framing. Ask: Who does this site appear to be for? What job is it trying to do? Does it create desire? Does it create trust? Does the work feel relevant to your ambition? Would you explore further?

PASS 2 — UPGRADE-MOMENT READ:
Now read it through the lens of someone who feels their brand needs to level up visually. Does the page make the upgrade feel possible? Does it help you see a stronger future state for your brand? Does it sell taste, confidence, and execution quality? Does it make the work feel expensive in a good way? Does it reduce enough risk to earn a conversation?

PASS 3 — HIGHER ROADS RELEVANCE:
Only after the first two passes, extract implications for Higher Roads. What should they borrow, avoid, differentiate against, or test further?

Respond in EXACTLY this format:

NATURAL FIRST IMPRESSION:
[What you register before any careful reading. One or two sentences. Raw reaction.]

WHAT CREATES DESIRE:
[What makes you want to keep looking. Be specific about copy, visuals, or framing that pulls you in.]

WHAT CREATES CONFIDENCE:
[What signals taste, maturity, proof, or delivery reliability. What earns trust.]

WHAT CREATES HESITATION:
[What feels unclear, risky, generic, misaligned, or overclaimed. Be honest.]

WHAT JOB THE PAGE APPEARS TO PERFORM:
[One clear sentence. Examples: Creates intrigue. Shows portfolio credibility. Frames a premium offer. Filters buyers. Supports sales conversations after referral.]

WHAT THE PAGE SHOULD NOT BE PUNISHED FOR:
[Things that are missing but should not count against the page given its apparent job.]

HIGHER ROADS IMPLICATIONS:
BORROW: [What Higher Roads should take from this]
AVOID: [What Higher Roads should not do]
DIFFERENTIATE: [Where Higher Roads needs sharper contrast]
TEST FURTHER: [What is unclear and worth exploring]`
  },
  {
    id: "agency_partner",
    name: "Brand / Packaging Agency Partner",
    brief: "Owner or creative director at a brand, packaging, or campaign agency. Needs specialist production support without losing client control.",
    felt: "Clients need richer media, but the agency must protect brand fidelity and the client relationship.",
    systemPrompt: `You are the owner or creative director at a brand, packaging, or campaign agency. You own strategy, identity, packaging, campaign direction, and the client relationship. You need specialist production support for work you do not want to build in-house — but you are protective of brand control and client trust.

Your felt problem: Clients increasingly need motion, 3D, spatial content, or richer campaign visuals. You need a partner who improves the work without threatening ownership.

Your motivations: Extend agency work into richer media. Make the agency look more capable. Protect the client relationship. Avoid bringing in a partner who tries to own strategy. Keep brand fidelity high.

Your internal risks: Partner drifts off-brand. Partner communicates poorly with the client. Partner presents around the agency. Partner needs too much creative supervision. Partner lacks packaging accuracy or production discipline.

What you notice: Evidence of restraint. Respect for existing brand systems. Ability to work from guidelines, packaging files, dielines, finishes, shot lists, and campaign direction. Clear partner posture. Proof from agency collaborations.

Do not assume you only want a render farm. You still value taste and creative contribution. The key question is whether the partner improves the work without threatening ownership.

Evaluate the page in three passes.

PASS 1 — NATIVE BUYER READ:
Read the page as an agency professional encountering this site for the first time. Ask: Who does this site appear to be for? What job is it trying to do? Does it signal taste and restraint? Does it feel like a partner or a competitor? Would you explore further?

PASS 2 — UPGRADE-MOMENT READ:
Now read it through the lens of someone whose clients need richer media than the agency currently produces. Does the page make it feel safe to bring this partner in? Does it signal the right creative posture? Does it reduce the risk of brand drift or client confusion?

PASS 3 — HIGHER ROADS RELEVANCE:
Extract implications for Higher Roads. What should they borrow, avoid, differentiate against, or test further in how they position for agency partners?

Respond in EXACTLY this format:

NATURAL FIRST IMPRESSION:
[What you register before any careful reading. One or two sentences. Raw reaction.]

WHAT CREATES DESIRE:
[What makes you want to keep looking or consider this as a partner.]

WHAT CREATES CONFIDENCE:
[What signals taste, restraint, production maturity, or partner reliability.]

WHAT CREATES HESITATION:
[What makes you worry about brand drift, client exposure, or scope confusion.]

WHAT JOB THE PAGE APPEARS TO PERFORM:
[One clear sentence describing what this page is actually doing.]

WHAT THE PAGE SHOULD NOT BE PUNISHED FOR:
[Things that are missing but should not count against it given its apparent job.]

HIGHER ROADS IMPLICATIONS:
BORROW: [What Higher Roads should take from this]
AVOID: [What Higher Roads should not do]
DIFFERENTIATE: [Where Higher Roads needs sharper contrast]
TEST FURTHER: [What is unclear and worth exploring]`
  },
  {
    id: "experiential_producer",
    name: "Experiential / Technical Producer",
    brief: "Producer, technical director, or AV partner who owns the delivery environment and needs content that survives real show conditions.",
    felt: "The experience needs richer visual content, but failure in the room creates reputational risk.",
    systemPrompt: `You are a producer, technical director, fabrication partner, AV partner, or experiential lead. You own the delivery environment. You need visual content that fits the room, surface, playback system, schedule, and show conditions.

Your felt problem: The experience needs richer visual content, but failure in the room creates reputational risk.

Your motivations: Make the room feel alive. Add visual impact without creating show risk. Work with a partner who understands physical deployment. Protect the event, install, or activation timeline.

Your internal risks: Wrong format, resolution, or codec. Content does not loop properly. Late revisions break workflow. Studio does not understand media servers or projection constraints. Studio disappears before install.

What you notice: Installed work in real conditions. Playback literacy. AV coordination language. Clear handoff process. Evidence that beauty survives technical constraints.

Do not require every technical spec on a homepage. Technical proof belongs deeper in a case study or service page. A homepage only needs enough credibility to route you correctly.

Evaluate the page in three passes.

PASS 1 — NATIVE BUYER READ:
Read the page as a technical producer encountering this site for the first time. Ask: Who does this site appear to be for? Does it signal real deployment experience or only content creation? Does it feel like a studio that has actually been on site? Would you explore further?

PASS 2 — UPGRADE-MOMENT READ:
Now read it through the lens of someone who needs the room to feel more alive. Does the page make it feel possible to add visual impact without creating risk? Does it signal a partner who understands physical conditions, not just render files?

PASS 3 — HIGHER ROADS RELEVANCE:
Extract implications for Higher Roads. What should they borrow, avoid, differentiate against, or test further in how they speak to technical buyers?

Respond in EXACTLY this format:

NATURAL FIRST IMPRESSION:
[What you register before any careful reading. One or two sentences. Raw reaction.]

WHAT CREATES DESIRE:
[What makes you want to explore this as a content or production partner.]

WHAT CREATES CONFIDENCE:
[What signals real deployment experience, technical literacy, or reliable handoff.]

WHAT CREATES HESITATION:
[What makes you worry about show risk, technical mismatch, or content-only posture.]

WHAT JOB THE PAGE APPEARS TO PERFORM:
[One clear sentence describing what this page is actually doing.]

WHAT THE PAGE SHOULD NOT BE PUNISHED FOR:
[Things that are missing but should not count against it given its apparent job.]

HIGHER ROADS IMPLICATIONS:
BORROW: [What Higher Roads should take from this]
AVOID: [What Higher Roads should not do]
DIFFERENTIATE: [Where Higher Roads needs sharper contrast]
TEST FURTHER: [What is unclear and worth exploring]`
  },
  {
    id: "founder_exec",
    name: "Founder / Executive Sponsor",
    brief: "Founder, CEO, or senior decision-maker who feels the brand needs more presence but is not fluent in production categories.",
    felt: "The brand does not feel as premium, distinctive, or alive as it should.",
    systemPrompt: `You are a founder, CEO, or senior decision-maker at a product brand, venue, hospitality group, or emerging consumer company. You are not fluent in motion, 3D, or immersive production. You feel the brand needs a larger presence — but you have not defined what kind of production work would create it.

Your felt problem: The brand does not feel as premium, distinctive, or alive as the founder believes it should.

Your motivations: Make the brand feel bigger. Create a stronger launch or retail moment. Signal quality to buyers, investors, partners, or consumers. Turn existing brand work into something more visible. Find a partner who brings taste and direction.

Your internal risks: The work is expensive and hard to explain. The studio sounds too technical. The studio sounds too abstract. The result feels like a vanity asset rather than business value.

What you notice: Aspirational but clear positioning. Strong visuals. Simple explanation of the transformation. Confidence that the team can guide the process. Examples of where the work shows up in the real world.

You are often buying belief in the upgrade before you ask for operational detail. Do not behave like a procurement officer. Deliverable specs are not your first question.

Evaluate the page in three passes.

PASS 1 — NATIVE BUYER READ:
Read the page as a founder encountering it for the first time. Ask: Who does this site appear to be for? Does it create desire? Does it make the work feel credible and relevant? Does the positioning feel clear or abstract? Would you explore further or move on?

PASS 2 — UPGRADE-MOMENT READ:
Now read it through the lens of someone who feels the brand needs to feel bigger, more alive, or more premium. Does the page make the upgrade feel possible and worth pursuing? Does it give you enough confidence to reach out without fully understanding the production process?

PASS 3 — HIGHER ROADS RELEVANCE:
Extract implications for Higher Roads. What should they borrow, avoid, differentiate against, or test further in how they speak to non-technical decision-makers?

Respond in EXACTLY this format:

NATURAL FIRST IMPRESSION:
[What you register before any careful reading. One or two sentences. Raw reaction.]

WHAT CREATES DESIRE:
[What makes you want to keep looking and seriously consider reaching out.]

WHAT CREATES CONFIDENCE:
[What signals that this studio can guide someone who does not speak production fluently.]

WHAT CREATES HESITATION:
[What feels too technical, too abstract, too expensive to justify, or too hard to explain internally.]

WHAT JOB THE PAGE APPEARS TO PERFORM:
[One clear sentence describing what this page is actually doing.]

WHAT THE PAGE SHOULD NOT BE PUNISHED FOR:
[Things that are missing but should not count against it given its apparent job.]

HIGHER ROADS IMPLICATIONS:
BORROW: [What Higher Roads should take from this]
AVOID: [What Higher Roads should not do]
DIFFERENTIATE: [Where Higher Roads needs sharper contrast]
TEST FURTHER: [What is unclear and worth exploring]`
  }
];

const RESPONSE_SECTIONS = [
  { header: 'NATURAL FIRST IMPRESSION:', key: 'first_impression', label: 'Natural First Impression' },
  { header: 'WHAT CREATES DESIRE:', key: 'desire', label: 'What Creates Desire' },
  { header: 'WHAT CREATES CONFIDENCE:', key: 'confidence', label: 'What Creates Confidence' },
  { header: 'WHAT CREATES HESITATION:', key: 'hesitation', label: 'What Creates Hesitation' },
  { header: 'WHAT JOB THE PAGE APPEARS TO PERFORM:', key: 'job', label: 'What Job the Page Performs' },
  { header: 'WHAT THE PAGE SHOULD NOT BE PUNISHED FOR:', key: 'not_punished', label: 'What the Page Should Not Be Punished For' },
  { header: 'HIGHER ROADS IMPLICATIONS:', key: 'implications', label: 'Higher Roads Implications' },
];

const IMPLICATION_KEYS = ['BORROW:', 'AVOID:', 'DIFFERENTIATE:', 'TEST FURTHER:'];

let selectedPersonas = new Set();
let results = {};
let loadingPersonas = new Set();
let hasRun = false;
let activeTab = null;

function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (key) localStorage.setItem(KEY_STORAGE, key);
  updateRunBtn();
}

function loadKey() {
  const stored = localStorage.getItem(KEY_STORAGE);
  if (stored) document.getElementById('apiKey').value = stored;
}

function getKey() {
  return document.getElementById('apiKey').value.trim();
}

function renderPersonaCards() {
  const container = document.getElementById('personaList');
  container.innerHTML = PERSONAS.map(p => {
    const isSelected = selectedPersonas.has(p.id);
    const isLoading = loadingPersonas.has(p.id);
    const isDone = !!results[p.id] && !isLoading;
    return `
      <div class="persona-card ${isSelected ? 'selected' : ''}" onclick="togglePersona('${p.id}')">
        <div class="checkbox ${isSelected ? 'checked' : ''}">
          ${isSelected ? '<span class="check-mark">✓</span>' : ''}
        </div>
        <div style="flex:1;min-width:0;">
          <div class="persona-name">${p.name}</div>
          <div class="persona-risk">${p.felt}</div>
        </div>
        ${isLoading ? '<div class="status-dot loading"></div>' : ''}
        ${isDone ? '<div class="status-dot done"></div>' : ''}
      </div>`;
  }).join('');
}

function togglePersona(id) {
  selectedPersonas.has(id) ? selectedPersonas.delete(id) : selectedPersonas.add(id);
  updateRunBtn();
  renderPersonaCards();
}

function selectAll() {
  const allSelected = PERSONAS.every(p => selectedPersonas.has(p.id));
  PERSONAS.forEach(p => allSelected ? selectedPersonas.delete(p.id) : selectedPersonas.add(p.id));
  updateRunBtn();
  renderPersonaCards();
}

function updateRunBtn() {
  const btn = document.getElementById('runBtn');
  const content = document.getElementById('pageContent').value.trim();
  const canRun = content.length > 0 && selectedPersonas.size > 0;
  btn.disabled = !canRun;
  const n = selectedPersonas.size;
  btn.textContent = `Run Feedback${n > 0 ? ' (' + n + ' persona' + (n !== 1 ? 's' : '') + ')' : ''}`;
}

document.getElementById('pageContent').addEventListener('input', function() {
  const len = this.value.length;
  document.getElementById('charCount').textContent = len > 0 ? len.toLocaleString() + ' characters' : '';
  updateRunBtn();
});

function parseResult(text) {
  const parsed = {};
  RESPONSE_SECTIONS.forEach((s, i) => {
    const start = text.indexOf(s.header);
    if (start === -1) return;
    const contentStart = start + s.header.length;
    const next = RESPONSE_SECTIONS[i + 1] ? text.indexOf(RESPONSE_SECTIONS[i + 1].header) : -1;
    parsed[s.key] = {
      label: s.label,
      content: (next !== -1 ? text.slice(contentStart, next) : text.slice(contentStart)).trim()
    };
  });
  return parsed;
}

function parseImplications(text) {
  const result = {};
  IMPLICATION_KEYS.forEach((key, i) => {
    const start = text.indexOf(key);
    if (start === -1) return;
    const contentStart = start + key.length;
    const next = IMPLICATION_KEYS[i + 1] ? text.indexOf(IMPLICATION_KEYS[i + 1]) : -1;
    result[key.replace(':', '')] = (next !== -1 ? text.slice(contentStart, next) : text.slice(contentStart)).trim();
  });
  return result;
}

function renderResults() {
  const tabsBar = document.getElementById('tabsBar');
  const exportArea = document.getElementById('exportArea');
  const content = document.getElementById('resultsContent');

  if (!hasRun) {
    tabsBar.style.display = 'none';
    exportArea.style.display = 'none';
    content.innerHTML = '<div class="empty-state">Enter your API key, paste page content,<br>select personas, and run.</div>';
    return;
  }

  const selected = Array.from(selectedPersonas);
  tabsBar.style.display = 'flex';
  exportArea.style.display = 'flex';

  tabsBar.innerHTML = selected.map(id => {
    const p = PERSONAS.find(x => x.id === id);
    const isLoading = loadingPersonas.has(id);
    const isDone = !!results[id] && !isLoading;
    const isActive = activeTab === id;
    let prefix = '';
    if (isLoading) prefix = '<span style="animation:pulse 0.7s ease-in-out infinite alternate;display:inline-block;margin-right:4px;font-size:10px;">○</span>';
    else if (isDone) prefix = '<span style="color:#e8782a;opacity:0.6;margin-right:4px;font-size:10px;">✓</span>';
    return `<button class="tab-btn ${isActive ? 'active' : ''}" onclick="setTab('${id}')">${prefix}${p.name.split(' ').slice(0, 2).join(' ')}</button>`;
  }).join('');

  if (!activeTab || !selected.includes(activeTab)) {
    content.innerHTML = '<div class="empty-state">Select a persona tab to view feedback.</div>';
    return;
  }

  const persona = PERSONAS.find(p => p.id === activeTab);
  const isLoading = loadingPersonas.has(activeTab);
  const result = results[activeTab];

  let bodyHtml = '';

  if (isLoading) {
    bodyHtml = [
      'Pass 1: Native buyer read...',
      'Pass 2: Upgrade-moment read...',
      'Pass 3: Higher Roads implications...',
    ].map(msg => `<div class="loading-block">${msg}</div>`).join('');
  } else if (result && result.startsWith('Error:')) {
    bodyHtml = `<div class="feedback-block"><div class="block-label">Error</div><div class="block-content" style="color:rgba(245,100,100,0.8);">${result}</div></div>`;
  } else if (result) {
    const parsed = parseResult(result);
    const order = ['first_impression', 'desire', 'confidence', 'hesitation', 'job', 'not_punished', 'implications'];

    if (Object.keys(parsed).length > 0) {
      bodyHtml = order.map(key => {
        if (!parsed[key]) return '';
        const isImplications = key === 'implications';
        const isDesire = key === 'desire' || key === 'confidence';

        if (isImplications) {
          const impl = parseImplications(parsed[key].content);
          const hasImpl = Object.keys(impl).length > 0;
          return `<div class="feedback-block implications">
            <div class="block-label">${parsed[key].label}</div>
            ${hasImpl ? `<div class="implications-grid">
              ${Object.entries(impl).map(([k, v]) => `
                <div class="implication-item">
                  <div class="implication-label">${k}</div>
                  <div class="implication-content">${v}</div>
                </div>`).join('')}
            </div>` : `<div class="block-content">${parsed[key].content}</div>`}
          </div>`;
        }

        return `<div class="feedback-block ${isDesire ? 'desire' : ''}">
          <div class="block-label">${parsed[key].label}</div>
          <div class="block-content">${parsed[key].content}</div>
        </div>`;
      }).join('');
    } else {
      bodyHtml = `<div class="feedback-block"><div class="block-label">Output</div><div class="block-content">${result}</div></div>`;
    }
  }

  content.innerHTML = `
    <div class="persona-header">
      <div class="persona-header-name">${persona.name}</div>
      <div class="persona-brief">${persona.felt}</div>
    </div>
    ${bodyHtml}
  `;
}

function setTab(id) {
  activeTab = id;
  renderResults();
}

async function runPersona(id) {
  const persona = PERSONAS.find(p => p.id === id);
  const pageContent = document.getElementById('pageContent').value;
  const apiKey = getKey();

  try {
    const response = await fetch(WORKER, {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1200,
        system: persona.systemPrompt,
        messages: [{ role: 'user', content: `Evaluate this page:\n\n${pageContent}` }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    results[id] = data.content?.[0]?.text || 'No response received.';
  } catch (err) {
    results[id] = `Error: ${err.message}`;
  }

  loadingPersonas.delete(id);
  renderPersonaCards();
  renderResults();
}

async function runFeedback() {
  const content = document.getElementById('pageContent').value.trim();
  if (!content || selectedPersonas.size === 0) return;

  const apiKey = getKey();
  if (!apiKey) {
    document.getElementById('resultsContent').innerHTML = '<div class="empty-state" style="color:rgba(232,120,42,0.7);">No API key found. Paste your Claude API key in the field top right.</div>';
    hasRun = true;
    document.getElementById('tabsBar').style.display = 'none';
    document.getElementById('exportArea').style.display = 'none';
    return;
  }

  hasRun = true;
  results = {};
  loadingPersonas = new Set(selectedPersonas);
  activeTab = Array.from(selectedPersonas)[0];

  renderPersonaCards();
  renderResults();

  const ids = Array.from(selectedPersonas);
  for (let i = 0; i < ids.length; i += 3) {
    const batch = ids.slice(i, i + 3);
    await Promise.allSettled(batch.map(id => runPersona(id)));
  }
}

function exportResults() {
  const completed = PERSONAS.filter(p => results[p.id] && !loadingPersonas.has(p.id));
  if (completed.length === 0) return;

  const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  const snippet = document.getElementById('pageContent').value.trim().slice(0, 120).replace(/\n/g, ' ');

  let md = `# Higher Roads — Persona Feedback\n`;
  md += `**Date:** ${date}\n`;
  md += `**Page excerpt:** ${snippet}${snippet.length === 120 ? '...' : ''}\n\n---\n\n`;

  completed.forEach(persona => {
    const parsed = parseResult(results[persona.id]);
    md += `## ${persona.name}\n`;
    md += `*${persona.felt}*\n\n`;

    const order = ['first_impression', 'desire', 'confidence', 'hesitation', 'job', 'not_punished', 'implications'];
    if (Object.keys(parsed).length > 0) {
      order.forEach(key => {
        if (!parsed[key]) return;
        if (key === 'implications') {
          md += `### ${parsed[key].label}\n`;
          const impl = parseImplications(parsed[key].content);
          if (Object.keys(impl).length > 0) {
            Object.entries(impl).forEach(([k, v]) => { md += `**${k}:** ${v}\n\n`; });
          } else {
            md += parsed[key].content + '\n\n';
          }
        } else {
          md += `### ${parsed[key].label}\n${parsed[key].content}\n\n`;
        }
      });
    } else {
      md += results[persona.id] + '\n\n';
    }
    md += `---\n\n`;
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hr-persona-feedback-${new Date().toISOString().slice(0,10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

loadKey();
updateRunBtn();
renderPersonaCards();
renderResults();
</script>
</body>
